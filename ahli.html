<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBTTC - Portal Semakan Ahli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col antialiased">

    <div class="max-w-md w-full mx-auto px-4 py-6 flex-grow flex flex-col gap-6">
        <!-- Header Portal -->
        <header class="text-center py-4 flex flex-col items-center">
            <img src="icon-192.png" alt="KBTTC Logo" class="h-32 object-contain mb-2 drop-shadow-lg" onerror="this.onerror=null; this.src='https://placehold.co/192x192/000000/ffffff?text=KBTTC'">
            <h1 class="text-2xl font-bold text-slate-900 mt-1">KBTTC Portal</h1>
            <p class="text-xs text-slate-500 font-medium tracking-wide uppercase">Semakan Status Yuran Layan Diri</p>
        </header>

        <!-- Bahagian Carian Ahli -->
        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h3 class="text-base font-bold text-slate-900 mb-1">Cari Status Keahlian</h3>
            <p class="text-xs text-slate-500 mb-4">Masukkan 5 digit terakhir nombor telefon anda untuk carian pantas.</p>
            
            <div class="space-y-3">
                <input type="text" id="digitPhone" maxlength="5" class="w-full px-3 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent text-center text-xl font-bold tracking-[0.25em] bg-slate-50" placeholder="•••••">
                <button id="btnSemak" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl transition duration-200 text-sm shadow-md active:scale-[0.98]">
                    Cari Rekod Saya
                </button>
            </div>
        </section>

        <!-- Loading Indicator Profesional -->
        <div id="loading" class="hidden text-center py-6">
            <svg class="animate-spin h-6 w-6 text-blue-600 mx-auto mb-2" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-xs text-slate-500 font-medium">Menyemak status keahlian anda...</p>
        </div>

        <!-- Ruangan Hasil Carian & Borang Pra-Daftar -->
        <div id="hasilCarian" class="space-y-4"></div>
    </div>

    <!-- Container Notifikasi Toast -->
    <div id="toastContainer" class="fixed bottom-5 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 w-full max-w-xs px-4"></div>

    <script>
    // URL DEPLOYMENT GOOGLE APPS SCRIPT ANDA
    const API_URL = "https://script.google.com/macros/s/AKfycbxDm4jEaoWbHfYTPMYJUSEUEp9MTqViHflbyo4ztdIvXG9Wc6ChNADxqWorZTICCSgK/exec";

    // Helper Toast Notification
    function tunjukMesej(mesej, status = "info") {
        const container = document.getElementById("toastContainer");
        const toast = document.createElement("div");
        
        let bgClass = "bg-slate-900 text-white";
        if (status === "success") bgClass = "bg-blue-600 text-white";
        if (status === "error") bgClass = "bg-rose-600 text-white";
        
        toast.className = `${bgClass} px-4 py-3 rounded-xl shadow-lg text-sm font-medium transition-all duration-300 opacity-0 translate-y-2 flex items-center justify-between gap-3`;
        toast.innerHTML = `<span>${mesej}</span><button class="text-white/60 hover:text-white" onclick="this.parentElement.remove()">✕</button>`;
        
        container.appendChild(toast);
        setTimeout(() => { toast.classList.remove("opacity-0", "translate-y-2"); }, 10);
        setTimeout(() => {
            toast.classList.add("opacity-0", "translate-y-2");
            setTimeout(() => { toast.remove(); }, 300);
        }, 4000);
    }

    // Fungsi carian ahli utama
    document.getElementById("btnSemak").onclick = async function() {
        let digit = document.getElementById("digitPhone").value.trim();
        if(digit.length !== 5) { 
            tunjukMesej("Sila masukkan tepat 5 digit nombor telefon anda!", "error"); 
            return; 
        }
        
        const loader = document.getElementById("loading");
        const hasil = document.getElementById("hasilCarian");
        
        loader.classList.remove("hidden");
        hasil.innerHTML = "";
        
        try {
            let res = await fetch(`${API_URL}?action=semakStatusAhli&digit=${digit}`);
            let data = await res.json();
            loader.classList.add("hidden");
            
            if(data.status !== "success" || data.data.length === 0) {
                tunjukMesej("Rekod keahlian tidak ditemui.", "error");
                paparkanBorangPraDaftar(digit);
                return;
            }
            
            data.data.forEach(ahli => {
                let card = document.createElement("div");
                card.className = "bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4";
                
                let vipBanner = ahli.vip 
                    ? `<div class="bg-amber-50 border border-amber-200 rounded-xl p-3 text-center text-xs font-bold text-amber-800">⭐ STATUS: AHLI VIP (YURAN SETAHUN LUNAS)</div>` 
                    : '';
                    
                let yuranSeumurBox = ahli.yuranSeumur 
                    ? `<div class="flex items-center gap-2 text-xs text-emerald-700 font-semibold bg-emerald-50 border border-emerald-100 rounded-lg py-2 px-3">✓ Yuran Keahlian Seumur Hidup: Lunas</div>` 
                    : '';
                
                // Bina grid yuran bulanan yang diperkemas (Lunas vs RM0 pudar)
                let gridHtml = '<div class="grid grid-cols-3 gap-2">';
                let bulanList = ["Jan", "Feb", "Mac", "Apr", "Mei", "Jun", "Jul", "Ogos", "Sep", "Okt", "Nov", "Dis"];
                
                bulanList.forEach(bln => {
                    let amaun = parseFloat(ahli.yuran[bln]) || 0;
                    
                    let textClass = 'text-slate-400';
                    let labelStatus = `RM${amaun}`;
                    let statusBg = 'bg-slate-50 border-slate-100';
                    
                    if (amaun >= 5) {
                        // Status: Lunas Penuh (>= RM5)
                        textClass = 'text-emerald-700';
                        labelStatus = `RM${amaun}`;
                        statusBg = 'bg-emerald-50/50 border-emerald-100';
                    } else if (amaun > 0 && amaun < 5) {
                        // Status: Bayaran Separa
                        textClass = 'text-amber-700';
                        labelStatus = `RM${amaun}/RM5`;
                        statusBg = 'bg-amber-50/50 border-amber-100';
                    } else {
                        // Status: Belum Bayar langsung (RM0 Kelabu Bersih, tiada label /RM5 berulang)
                        textClass = 'text-slate-400/70';
                        labelStatus = 'RM0';
                        statusBg = 'bg-slate-50/60 border-slate-100/70';
                    }
                    
                    gridHtml += `
                        <div class="p-2.5 text-center rounded-xl border ${statusBg}">
                            <div class="text-[10px] font-bold text-slate-400 tracking-wider uppercase">${bln}</div>
                            <div class="text-xs font-bold ${textClass} mt-0.5">${labelStatus}</div>
                        </div>
                    `;
                });
                gridHtml += '</div>';
                
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[10px] font-bold text-slate-400 font-mono">ID: ${ahli.id}</span>
                            <h3 class="text-lg font-bold text-slate-900 leading-tight mt-0.5">${ahli.nama}</h3>
                        </div>
                        ${ahli.vip ? '<span class="px-2 py-0.5 rounded-full text-[10px] font-bold bg-amber-50 text-amber-700 border border-amber-200">VIP</span>' : '<span class="px-2 py-0.5 rounded-full text-[10px] font-bold bg-slate-50 text-slate-600 border border-slate-200">Ahli</span>'}
                    </div>
                    ${vipBanner}
                    ${yuranSeumurBox}
                    <div class="space-y-2">
                        <h4 class="text-xs font-bold text-slate-700 uppercase tracking-wide">Status Kutipan Yuran Bulanan</h4>
                        ${gridHtml}
                    </div>
                `;
                hasil.appendChild(card);
            });
            
        } catch(e) {
            loader.classList.add("hidden");
            tunjukMesej("Gagal menghubungi pangkalan data. Sila periksa rangkaian.", "error");
        }
    };

    function paparkanBorangPraDaftar(digitPhone) {
        const hasil = document.getElementById("hasilCarian");
        let div = document.createElement("div");
        div.className = "bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4";
        
        div.innerHTML = `
            <div class="bg-blue-50 border border-blue-100 rounded-xl p-4 text-center">
                <h4 class="text-sm font-bold text-blue-900">Rekod Anda Belum Ada?</h4>
                <p class="text-xs text-blue-700 mt-1">Sistem kami masih fasa kemaskini. Sila hantar permohonan Pra-Daftar ahli lama di bawah untuk pengesahan & kelulusan Admin.</p>
            </div>
            <form id="formPraDaftar" class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Nama(yang dikenali)</label>
                    <input type="text" id="praNama" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent text-sm bg-white" placeholder="Contoh: Mohd Ali" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Nombor Telefon Penuh</label>
                    <input type="tel" id="praPhone" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent text-sm bg-white" placeholder="Contoh: 0123456789" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Nota Tambahan / Catatan Sejarah Keahlian (Opsional)</label>
                    <textarea id="praNota" rows="3" class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent text-sm bg-white" placeholder="Contoh: Saya dah jelaskan yuran seumur hidup kepada bendahari lama pada tahun 2023..."></textarea>
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 px-4 rounded-xl transition duration-200 text-sm shadow-md active:scale-[0.98]">
                    Hantar Borang Pra-Daftar Ahli Lama
                </button>
            </form>
        `;
        hasil.appendChild(div);

        document.getElementById("formPraDaftar").onsubmit = async function(e) {
            e.preventDefault();
            const loader = document.getElementById("loading");
            loader.classList.remove("hidden");
            
            let payload = {
                action: "praDaftar",
                nama: document.getElementById("praNama").value.trim(),
                phone: document.getElementById("praPhone").value.trim(),
                nota: document.getElementById("praNota").value.trim()
            };
            
            try {
                let res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
                let data = await res.json();
                loader.classList.add("hidden");
                
                if (data.status === "success") {
                    hasil.innerHTML = `
                        <div class="bg-emerald-50 border border-emerald-200 rounded-2xl p-5 text-center space-y-3">
                            <div class="text-3xl">🎉</div>
                            <h3 class="text-base font-bold text-emerald-900">Pra-Daftar Berjaya Dihantar!</h3>
                            <p class="text-xs text-emerald-700 leading-relaxed">Maklumat anda bagi nama <strong class="underline">${payload.nama}</strong> telah dimasukkan ke dalam sistem kelulusan.</p>
                            <div class="border-t border-emerald-100 pt-3 text-[11px] text-emerald-600 font-medium bg-white/50 p-2.5 rounded-xl">
                                Sila maklumkan kepada Admin KBTTC untuk mengaktifkan akaun rasmi anda.
                            </div>
                        </div>
                    `;
                    tunjukMesej("Pra-daftar berjaya dihantar ke sistem data!", "success");
                } else {
                    tunjukMesej("Gagal menghantar permohonan.", "error");
                }
            } catch(error) {
                loader.classList.add("hidden");
                tunjukMesej("Ralat sambungan untuk menghantar pra-daftar.", "error");
            }
        };
    }
    </script>
</body>
</html>
