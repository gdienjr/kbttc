<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBTTC - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col antialiased">

    <div class="max-w-md w-full mx-auto px-4 py-6 flex-grow flex flex-col gap-6">
        
        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h3 class="text-base font-bold text-slate-900 mb-2">Pendaftaran Ahli Baru</h3>
            <form id="formDaftar" class="space-y-3">
                <input type="text" id="regNama" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm" placeholder="Nama Penuh" required>
                <input type="tel" id="regPhone" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm" placeholder="No Telefon" required>
                <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-xl text-sm">Daftar & Bayar RM10</button>
            </form>
        </section>

        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h3 class="text-base font-bold text-slate-900 mb-2">Skrol & Rekod Pembayaran Yuran</h3>
            <input type="text" id="cariAhli" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm mb-4" placeholder="Cari nama atau telefon...">
            
            <div id="senaraiAhliBox" class="max-h-60 overflow-y-auto border border-slate-100 rounded-xl bg-slate-50/50 p-2 space-y-2"></div>

            <div id="sectionBayar" class="hidden mt-5 pt-5 border-t border-dashed border-slate-200">
                <p class="text-xs text-slate-500 mb-1">Kemaskini yuran untuk:</p>
                <h4 id="namaAhliTerpilih" class="text-base font-bold text-blue-600 mb-3">Nama Ahli</h4>
                
                <div id="statusYuranBox" class="mb-4 p-3 bg-slate-50 border border-slate-100 rounded-xl">
                    <p class="text-[10px] uppercase font-bold text-slate-400 mb-2">Status Yuran Semasa:</p>
                    <div id="dataStatusYuran" class="text-xs text-slate-600">Sedang menyemak...</div>
                </div>
                
                <form id="formBayar" class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <select id="bulanBayar" class="w-full px-3 py-3 rounded-xl border border-slate-200 text-sm">
                            <option value="Jan">Jan</option><option value="Feb">Feb</option><option value="Mac">Mac</option>
                            <option value="Apr">Apr</option><option value="Mei">Mei</option><option value="Jun" selected>Jun</option>
                            <option value="Jul">Jul</option><option value="Ogos">Ogos</option><option value="Sep">Sep</option>
                            <option value="Okt">Okt</option><option value="Nov">Nov</option><option value="Dis">Dis</option>
                        </select>
                        <input type="number" id="amaunBayar" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm" placeholder="Amaun (RM)" required>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-xl text-sm">Sahkan Bayaran</button>
                </form>
            </div>
        </section>
    </div>

    <div id="toastContainer" class="fixed bottom-5 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 w-full max-w-xs px-4"></div>
    <div id="loadingOverlay" class="fixed inset-0 bg-slate-950/40 backdrop-blur-[2px] hidden items-center justify-center z-50">
        <div class="bg-white p-5 rounded-2xl shadow-xl">Memproses...</div>
    </div>

    <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw0KMsPGj9Zym1n7x_KPAhvLiE5aLHtYDybSiTbbxWz3Fb0bm4z1dWlrIk7ZuCLPW-x/exec";
    
    // Fungsi pilihAhli yang dikemaskini
    async function pilihAhli(nama) {
        document.getElementById("namaAhliTerpilih").innerText = nama;
        document.getElementById("sectionBayar").classList.remove("hidden");
        document.getElementById("dataStatusYuran").innerHTML = "Sedang memuatkan rekod...";
        
        try {
            let response = await fetch(`${API_URL}?action=getStatusYuran&nama=${encodeURIComponent(nama)}`);
            let hasil = await response.json();
            
            if (hasil.status === "success") {
                let htmlGrid = '<div class="grid grid-cols-6 gap-1.5 text-center">';
                hasil.dataBulan.forEach(b => {
                    let warna = b.bayar === "✓" ? "bg-emerald-100 text-emerald-700" : "bg-rose-100 text-rose-600";
                    htmlGrid += `<div class="${warna} py-1 rounded font-bold text-[9px]">
                                    <div>${b.bulan}</div>
                                    <div>${b.bayar}</div>
                                 </div>`;
                });
                htmlGrid += '</div>';
                document.getElementById("dataStatusYuran").innerHTML = htmlGrid;
            } else {
                document.getElementById("dataStatusYuran").innerText = "Tiada rekod yuran ditemui.";
            }
        } catch (e) {
            document.getElementById("dataStatusYuran").innerText = "Ralat memuatkan status.";
        }
        
        document.getElementById("sectionBayar").scrollIntoView({ behavior: 'smooth' });
    }

    // ... (Fungsi lain dikekalkan sama seperti asal anda)
    window.onload = muatSemuaData;
    </script>
</body>
</html>
